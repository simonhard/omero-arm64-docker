#
# By default this uses pre-built images from GHCR. To use locally built
# images, override the image variables in .env:
#
#   OMERO_SERVER_IMAGE=ghcr.io/simonhard/omero-server-arm64:latest
#   OMERO_WEB_IMAGE=ghcr.io/simonhard/omero-web-arm64:latest
#
# Or build locally first:
#   python3 build.py
#   OMERO_SERVER_IMAGE=ghcr.io/simonhard/omero-server-arm64:latest docker compose up -d

services:

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OMERO_DB_USER:-omero}
      POSTGRES_PASSWORD: ${OMERO_DB_PASS:?OMERO_DB_PASS is required}
      POSTGRES_DB: ${OMERO_DB_NAME:-omero}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - omero-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OMERO_DB_USER:-omero}"]
      interval: 10s
      timeout: 5s
      retries: 5

  omero-server:
    image: ${OMERO_SERVER_IMAGE:-ghcr.io/simonhard/omero-server-arm64:latest}
    restart: unless-stopped
    platform: linux/arm64
    environment:
      CONFIG_omero_db_user: ${OMERO_DB_USER:-omero}
      CONFIG_omero_db_pass: ${OMERO_DB_PASS:?OMERO_DB_PASS is required}
      CONFIG_omero_db_name: ${OMERO_DB_NAME:-omero}
      CONFIG_omero_db_host: postgres
      CONFIG_omero_certificates_commonname: omero-server
      ROOTPASS: ${OMERO_ROOT_PASS:?OMERO_ROOT_PASS is required}
    volumes:
      - omero-data:/OMERO
    networks:
      - omero-network
    depends_on:
      postgres:
        condition: service_healthy
    # Ports 4063 and 4064 are intentionally not published; only accessible
    # within the omero-network by omero-web and admin tooling.

  omero-web:
    image: ${OMERO_WEB_IMAGE:-ghcr.io/simonhard/omero-web-arm64:latest}
    restart: unless-stopped
    platform: linux/arm64
    environment:
      OMEROHOST: "omero-server"
      CONFIG_omero_web_server__list: >-
        [["omero-server", 4064, "omero-server"]]
      CONFIG_omero_web_cors__origin__whitelist: '["127.0.0.1:8094"]'
      CONFIG_omero_web_application__server_host: 0.0.0.0
      CONFIG_omero_web_csrf__trusted__origins: ${OMERO_WEB_CSRF_TRUSTED_ORIGINS:-'["http://127.0.0.1:8094","http://localhost:8094"]'}
    networks:
      - omero-network
    depends_on:
      - omero-server

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8094:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment to add TLS certificates:
      # - ./certs:/etc/nginx/certs:ro
    networks:
      - omero-network
    depends_on:
      - omero-web

volumes:
  postgres-data:
  omero-data:

networks:
  omero-network:
    driver: bridge
